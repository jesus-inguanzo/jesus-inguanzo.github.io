<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Page</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh; /* Changed from height to min-height to accommodate extra images */
            background-color: #0f172a;
            color: #f8fafc;
            margin: 0;
            padding: 2rem 0; /* Adds some breathing room at the top and bottom */
        }
        .container {
            text-align: center;
            border: 1px solid #334155;
            padding: 2.5rem;
            border-radius: 12px;
            background-color: #1e293b;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            max-width: 400px;
        }
        h1 { color: #38bdf8; margin-bottom: 0.5rem; }
        img {
            max-width: 100%;
            height: auto;
            border-radius: 8px;
            margin-top: 1.5rem;
            margin-bottom: 0.5rem; /* Prevents stacked images from touching */
            border: 2px solid #38bdf8;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>My Images</h1>
        
        <!-- Existing Cat Image -->
        <img src="cat.jpg" alt="Cat">
        
        <!-- New JPEG Image -->
        <img src="IMG_1320.jpeg" alt="Beautiful Landscape">
        
        <!-- New GIF Image -->
        <img src="IMG_1323.gif" alt="Funny Animation">
    </div>
</body>
</html>
